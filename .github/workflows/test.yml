name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint
        run: |
          ruff check arog_eval tests
          ruff format --check arog_eval tests
        continue-on-error: true

      - name: Validate benchmark items
        run: |
          python -c "from arog_eval.runner import load_benchmark; items = load_benchmark('benchmark/v1'); assert len(items) >= 50, f'Expected >=50 items, got {len(items)}'; print(f'OK: {len(items)} items load and validate')"
